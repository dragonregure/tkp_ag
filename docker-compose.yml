services:
  mysql:
    image: mysql:8.4
    container_name: tkp-ag-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-tkp_ag}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
    volumes:
      - tkp_ag_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tkp-ag-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tkp_ag_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: tkp-ag-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: tkp-ag-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: tkp-ag-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - ./docker/backend/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - tkp_ag_vendor:/var/www/html/vendor
      - tkp_ag_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: "TKP AG"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${MYSQL_DATABASE:-tkp_ag}"
      DB_USERNAME: root
      DB_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: "hello@tkp-ag.local"
      MAIL_FROM_NAME: "TKP AG"
      XDEBUG_MODE: "${XDEBUG_MODE:-debug,develop}"
      PHP_IDE_CONFIG: "serverName=tkp-ag"
      TKP_AG_RUN_MIGRATIONS: "${TKP_AG_RUN_MIGRATIONS:-true}"
      TKP_AG_RUN_SEEDERS: "${TKP_AG_RUN_SEEDERS:-true}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: tkp-ag-queue
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - ./docker/backend/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - tkp_ag_vendor:/var/www/html/vendor
      - tkp_ag_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: "TKP AG"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${MYSQL_DATABASE:-tkp_ag}"
      DB_USERNAME: root
      DB_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      XDEBUG_MODE: "${XDEBUG_MODE:-debug,develop}"
      PHP_IDE_CONFIG: "serverName=tkp-ag"
      TKP_AG_RUN_MIGRATIONS: "false"
      TKP_AG_RUN_SEEDERS: "false"
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work --queue=default --tries=3 --timeout=90

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: tkp-ag-scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - ./docker/backend/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - tkp_ag_vendor:/var/www/html/vendor
      - tkp_ag_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: "TKP AG"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${MYSQL_DATABASE:-tkp_ag}"
      DB_USERNAME: root
      DB_PASSWORD: "${MYSQL_ROOT_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      XDEBUG_MODE: "${XDEBUG_MODE:-debug,develop}"
      PHP_IDE_CONFIG: "serverName=tkp-ag"
      TKP_AG_RUN_MIGRATIONS: "false"
      TKP_AG_RUN_SEEDERS: "false"
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work

volumes:
  tkp_ag_mysql_data:
  tkp_ag_redis_data:
  tkp_ag_vendor:
  tkp_ag_bootstrap_cache:
